# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Publish Python 🐍 distribution 📦 to PyPI

# Triggers:
#   - push of a tag matching v*  (canonical release path)
#   - workflow_dispatch          (manual escape hatch from the GitHub UI)
# Regular pushes to main do NOT trigger this workflow.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # Reuse the standalone Tests workflow as a job here. Single source of truth
  # for what "tests pass" means — same definition fires on push to main, on
  # PRs, on manual dispatch, and as the gate for this publish flow.
  test:
    uses: ./.github/workflows/tests.yml

  build:
    name: Build distribution 📦
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Twine check (PyPI metadata)
        run: python -m twine check dist/*

      - name: Store distribution packages
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish 🐍 to PyPI
    # Explicitly require both jobs. `build` already needs `test` transitively,
    # but listing both here makes the gating intent obvious in the workflow.
    needs: [test, build]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/mps-sdpa

    permissions:
      # Required for OIDC trusted publishing — no API token needed.
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
