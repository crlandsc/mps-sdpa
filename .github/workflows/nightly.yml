# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Nightly full matrix

# Cron 03:00 UTC daily — off-peak runner availability, picks up
# overnight torch-nightly drops. Also runnable on demand.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  test:
    name: Py${{ matrix.python-version }} x torch ${{ matrix.torch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        torch: ["stable", "nightly"]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install torch (${{ matrix.torch }})
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.torch }}" = "nightly" ]; then
            pip install --pre torch \
              --index-url https://download.pytorch.org/whl/nightly/cpu
          fi

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q
