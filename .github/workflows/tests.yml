# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Tests

# Triggers:
#   - push to main             (auto-run on every commit)
#   - pull_request             (gate merges)
#   - workflow_dispatch        (manual trigger from the GitHub UI)
#   - workflow_call            (callable from pypi.yml as a reusable workflow)
#
# This workflow does NOT publish anything. It is the test gate; pypi.yml
# invokes it via `uses: ./.github/workflows/tests.yml` so there is one
# source of truth for what "tests pass" means.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    name: Run tests on Apple silicon
    # MPS is only available on macOS arm64 runners. Linux runners would skip
    # every MPS-gated test silently. macos-latest currently maps to an Apple
    # silicon SKU and ships Xcode CLT, which the zero-copy C++ extension
    # needs to JIT-compile.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q
